name: Build and Deploy to EKS

on:
  push:
    branches:
      - main

env:
  AWS_REGION: ap-south-1
  ECR_REPOSITORY: ecs-dotnet-app
  EKS_CLUSTER: my-eks-cluster
  IMAGE_TAG: ${{ github.sha }}

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Login to ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build and push image
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
      run: |
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
        echo "IMAGE=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_ENV

    - name: Update kubeconfig
      run: |
        aws eks update-kubeconfig \
          --name ${{ env.EKS_CLUSTER }} \
          --region ${{ env.AWS_REGION }}

    - name: Create or update K8s secret
      run: |
        kubectl create secret generic rds-secret \
          --from-literal=connection-string='${{ secrets.DB_CONNECTION_STRING }}' \
          --from-literal=sqs-queue-url='${{ secrets.SQS_QUEUE_URL }}' \
          --dry-run=client -o yaml | kubectl apply -f -

    - name: Deploy to EKS
      run: |
        kubectl apply -f - <<EOF
        apiVersion: apps/v1
        kind: Deployment
        metadata:
          name: dotnet-api
          namespace: default
        spec:
          replicas: 1
          selector:
            matchLabels:
              app: dotnet-api
          template:
            metadata:
              labels:
                app: dotnet-api
            spec:
              serviceAccountName: dotnet-app-sa
              containers:
              - name: dotnet-api
                image: ${{ env.IMAGE }}
                ports:
                - containerPort: 8080
                env:
                - name: ASPNETCORE_URLS
                  value: "http://+:8080"
                - name: DB_CONNECTION_STRING
                  valueFrom:
                    secretKeyRef:
                      name: rds-secret
                      key: connection-string
                - name: SQS_QUEUE_URL
                  valueFrom:
                    secretKeyRef:
                      name: rds-secret
                      key: sqs-queue-url
                resources:
                  requests:
                    cpu: "250m"
                    memory: "256Mi"
                  limits:
                    cpu: "500m"
                    memory: "512Mi"
        EOF

    - name: Verify rollout
      run: |
        kubectl rollout status deployment/dotnet-api --timeout=120s