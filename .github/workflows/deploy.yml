name: Build and Deploy to EKS
on:
  push:
    branches:
      - main
env:
  AWS_REGION: ap-south-1
  ECR_REPOSITORY: ecs-dotnet-app
  EKS_CLUSTER: my-eks-cluster-tf
  IMAGE_TAG: ${{ github.sha }}
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Login to ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build and push image
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
      run: |
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
        echo "IMAGE=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_ENV

    - name: Update kubeconfig
      run: |
        aws eks update-kubeconfig \
          --name ${{ env.EKS_CLUSTER }} \
          --region ${{ env.AWS_REGION }}

    - name: Verify cluster access
      run: kubectl get nodes

    - name: Create or update K8s secret
      run: |
        kubectl create secret generic app-secret \
          --from-literal=connection-string='${{ secrets.DB_CONNECTION_STRING }}' \
          --from-literal=sqs-queue-url='${{ secrets.SQS_QUEUE_URL }}' \
          --dry-run=client -o yaml | kubectl apply -f -

    - name: Deploy to EKS
      run: |
        kubectl apply -f - <<EOF
        apiVersion: apps/v1
        kind: Deployment
        metadata:
          name: ecs-dotnet-app
          namespace: default
        spec:
          replicas: 2
          selector:
            matchLabels:
              app: ecs-dotnet-app
          template:
            metadata:
              labels:
                app: ecs-dotnet-app
            spec:
              containers:
              - name: ecs-dotnet-app
                image: ${{ env.IMAGE }}
                ports:
                - containerPort: 5000
                env:
                - name: ASPNETCORE_URLS
                  value: "http://+:5000"
                - name: DB_CONNECTION_STRING
                  valueFrom:
                    secretKeyRef:
                      name: app-secret
                      key: connection-string
                - name: SQS_QUEUE_URL
                  valueFrom:
                    secretKeyRef:
                      name: app-secret
                      key: sqs-queue-url
                resources:
                  requests:
                    cpu: "250m"
                    memory: "256Mi"
                  limits:
                    cpu: "500m"
                    memory: "512Mi"
                livenessProbe:
                  httpGet:
                    path: /health
                    port: 5000
                  initialDelaySeconds: 10
                  periodSeconds: 30
                readinessProbe:
                  httpGet:
                    path: /health
                    port: 5000
                  initialDelaySeconds: 5
                  periodSeconds: 10
        EOF

    - name: Verify rollout
      run: |
        kubectl rollout status deployment/ecs-dotnet-app --timeout=120s
